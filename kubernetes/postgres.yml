apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventorypro-db
  namespace: inventorypro
  labels:
    app: inventorypro
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventorypro
      tier: database
  template:
    metadata:
      labels:
        app: inventorypro
        tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "inventorypro"
            - name: POSTGRES_USER
              value: "inventorypro_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventorypro-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: inventorypro-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: inventorypro
spec:
  selector:
    app: inventorypro
    tier: database
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inventorypro-postgres-pvc
  namespace: inventorypro
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi