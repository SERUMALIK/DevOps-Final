global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'inventorypro'
    owner: 'SERUMALIK'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # InventoryPro FastAPI backend metrics
  - job_name: 'inventorypro-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node exporter (host metrics) — deploy node-exporter alongside
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Postgres exporter (optional)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']